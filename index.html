<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembrete de Dadiva</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f7f6; color: #333; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        h2 { color: #d32f2f; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 20px; margin: 15px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; }
        .btn-m { background-color: #007bff; }
        .btn-f { background-color: #d63384; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Próxima Dádiva</h2>
        <p>Selecione para agendar o seu lembrete:</p>
        
        <button class="btn btn-m" onclick="addCal(90)">Homem (3 meses)</button>
        <button class="btn btn-f" onclick="addCal(120)">Mulher (4 meses)</button>
    </div>

    <script>
        function addCal(days) {
            const now = new Date();
            const eventDate = new Date();
            eventDate.setDate(now.getDate() + days);

            const f = (d) => d.toISOString().replace(/-|:|\.\d+/g, "").split("T")[0] + "T100000Z";
            const start = f(eventDate);
            const stamp = f(now);

            // Using simple text without accents for technical fields to ensure compatibility
            const ics = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//DevDoc//Next//PT",
                "BEGIN:VEVENT",
                "UID:" + Date.now() + "@devdoc",
                "DTSTAMP:" + stamp,
                "DTSTART:" + start,
                "DTEND:" + start.replace("T100000", "T110000"),
                "SUMMARY:Proxima Dadiva de Sangue",
                "DESCRIPTION:Obrigado por ajudar a salvar vidas!",
                "BEGIN:VALARM",
                "TRIGGER:-P7D",
                "ACTION:DISPLAY",
                "DESCRIPTION:Lembrete de Dadiva",
                "END:VALARM",
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\r\n");

            const link = document.createElement("a");
            link.href = "data:text/calendar;charset=utf8," + encodeURIComponent(ics);
            link.download = "lembrete.ics";
            link.click();
        }
    </script>
</body>
</html>
