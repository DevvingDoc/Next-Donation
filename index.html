<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próxima Dádiva de Sangue</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 40px 20px; background-color: #f8f9fa; color: #333; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #d32f2f; margin-bottom: 20px; }
        p { line-height: 1.5; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; color: white; transition: background 0.3s; }
        .btn-male { background-color: #007bff; }
        .btn-female { background-color: #d81b60; }
        .footer { font-size: 12px; color: #888; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🩸 Próxima Dádiva</h2>
        <p>Obrigado por ajudar a salvar vidas hoje!<br><br>Selecione a sua opção para <b>agendar o lembrete</b> no seu telemóvel:</p>
        
        <button class="btn btn-male" onclick="addCalendar(90)">Homem (3 meses)</button>
        <button class="btn btn-female" onclick="addCalendar(120)">Mulher (4 meses)</button>
        
        <div class="footer">O calendário irá abrir automaticamente.<br>Clique em "Adicionar" ou "Guardar".</div>
    </div>

    <script>
        function addCalendar(days) {
            const date = new Date();
            date.setDate(date.getDate() + days);
            const dateStr = date.toISOString().replace(/-|:|\.\d+/g, "").split("T")[0] + "T100000Z";
            
            const icsData = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//BloodBank//PT",
                "BEGIN:VEVENT",
                "UID:" + Date.now() + "@bloodbank.pt",
                "DTSTAMP:" + dateStr,
                "DTSTART:" + dateStr,
                "DTEND:" + dateStr.replace("T100000", "T103000"),
                "SUMMARY:Dádiva de Sangue 🩸",
                "DESCRIPTION:Já pode voltar a salvar vidas! Obrigado pela sua generosidade.",
                "BEGIN:VALARM",
                "TRIGGER:-P7D",
                "ACTION:DISPLAY",
                "DESCRIPTION:Lembrete: Falta 1 semana para poder doar sangue novamente",
                "END:VALARM",
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\\n");
            
            const blob = new Blob([icsData.replace(/\\\\n/g, '\\n')], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'Lembrete_Dadiva.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
